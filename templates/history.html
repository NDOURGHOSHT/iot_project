{% extends "base.html" %}

{% block title %}Historique{% endblock %}

{% block content %}

<h2 class="mb-4">Historique des données</h2>

<div class="card">
  <div class="card-body">
    <canvas id="chart-temp"></canvas>
  </div>
</div>

{% endblock %}

{% block scripts %}

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
fetch('/history-data')
  .then(res => res.json())
  .then(data => {

    console.log("DATA:", data);

    let labels = [];
    let temps = [];

    data.reverse().forEach((d, i) => {
      labels.push(i);
      temps.push(d.temperature);
    });

    const canvas = document.getElementById("chart-temp");

    if (!canvas) {
      console.error("Canvas introuvable !");
      return;
    }

    const ctx = canvas.getContext("2d");

    new Chart(ctx, {
      type: 'line',
      data: {
        labels: labels,
        datasets: [{
          label: 'Température',
          data: temps,
          borderWidth: 2
        }]
      }
    });

  })
  .catch(err => console.log("Erreur:", err));
</script>

{% endblock %}
